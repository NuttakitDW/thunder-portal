version: '3.8'

services:
  # Bitcoin Core in regtest mode
  bitcoin-regtest:
    image: ruimarinho/bitcoin-core:latest
    container_name: thunder-bitcoin-regtest
    environment:
      BITCOIN_RPC_USER: thunderportal
      BITCOIN_RPC_PASSWORD: thunderportal123
    command:
      - -regtest
      - -server
      - -rpcuser=thunderportal
      - -rpcpassword=thunderportal123
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -fallbackfee=0.00001
      - -txindex
      - -deprecatedrpc=create_bdb
    ports:
      - "18443:18443"  # RPC port for regtest
      - "18444:18444"  # P2P port for regtest
    volumes:
      - ./data/bitcoin:/home/bitcoin/.bitcoin
    networks:
      - thunder-network
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=thunderportal", "-rpcpassword=thunderportal123", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Ethereum Hardhat Node
  ethereum:
    build:
      context: .
      dockerfile: ethereum/Dockerfile
    container_name: thunder-ethereum
    ports:
      - "8545:8545"
    volumes:
      - ./deployments:/app/deployments
      - ./logs:/app/logs
    networks:
      - thunder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Bitcoin HTLC API Service
  bitcoin-htlc:
    build:
      context: ./bitcoin-htlc
      dockerfile: Dockerfile
    container_name: thunder-bitcoin-htlc
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: sqlite:///app/data/thunder_portal.db
      BITCOIN_RPC_URL: http://thunderportal:thunderportal123@bitcoin-regtest:18443
      BITCOIN_NETWORK: regtest
      RUST_LOG: info
    volumes:
      - ./bitcoin-htlc/data:/app/data
    depends_on:
      bitcoin-regtest:
        condition: service_healthy
    networks:
      - thunder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Relayer Service
  relayer:
    build:
      context: ./relayer
      dockerfile: Dockerfile
    container_name: thunder-relayer
    ports:
      - "3001:3001"
    environment:
      ETHEREUM_RPC_URL: http://ethereum:8545
      BITCOIN_HTLC_URL: http://bitcoin-htlc:3000
      NODE_ENV: production
    volumes:
      - ./deployments:/app/deployments:ro
    depends_on:
      ethereum:
        condition: service_healthy
      bitcoin-htlc:
        condition: service_healthy
    networks:
      - thunder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Resolver Service
  resolver:
    build:
      context: ./resolver
      dockerfile: Dockerfile
    container_name: thunder-resolver
    ports:
      - "3002:3002"
    environment:
      ETHEREUM_RPC_URL: http://ethereum:8545
      BITCOIN_RPC_URL: http://thunderportal:thunderportal123@bitcoin-regtest:18443
      RELAYER_URL: http://relayer:3001
      NODE_ENV: production
    volumes:
      - ./deployments:/app/deployments:ro
    depends_on:
      ethereum:
        condition: service_healthy
      bitcoin-regtest:
        condition: service_healthy
      relayer:
        condition: service_healthy
    networks:
      - thunder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Contract deployment watcher (ensures contracts are deployed)
  contract-deployer:
    build:
      context: .
      dockerfile: ethereum/Dockerfile
    container_name: thunder-contract-deployer
    command: ["sh", "-c", "sleep 30 && echo 'Contracts should be deployed by ethereum service'"]
    depends_on:
      ethereum:
        condition: service_healthy
    networks:
      - thunder-network

networks:
  thunder-network:
    driver: bridge

volumes:
  bitcoin-data:
  ethereum-data:
  htlc-data: